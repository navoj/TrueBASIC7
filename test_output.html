<!DOCTYPE html><html><head><title>TrueBASIC Graphics</title><style>body{margin:20px;font-family:Arial}canvas{border:1px solid black}</style></head><body><h2>TrueBASIC Graphics</h2><canvas id="canvas" width="800" height="600"></canvas><div><svg width="800" height="600" xmlns="http://www.w3.org/2000/svg"><line x1="80" y1="540" x2="720" y2="60" stroke="black" stroke-width="1" /><circle cx="400" cy="300" r="2" fill="none" stroke="black" stroke-width="1" /><text x="160" y="120" fill="black" font-family="Arial" font-size="12">Hello TrueBASIC!</text></svg></div><script>const canvas = document.getElementById("canvas");const ctx = canvas.getContext("2d");ctx.clearRect(0, 0, canvas.width, canvas.height);ctx.beginPath(); ctx.moveTo(80, 540); ctx.lineTo(720, 60); ctx.strokeStyle = "black"; ctx.lineWidth = 1; ctx.stroke();ctx.beginPath(); ctx.arc(400, 300, 2, 0, 2 * Math.PI); ctx.strokeStyle = "black"; ctx.stroke();ctx.fillStyle = "black"; ctx.font = "12px Arial"; ctx.fillText("Hello TrueBASIC!", 160, 120);</script></body></html>
