le = "black"; ctx.lineWidth = 1; ctx.stroke();ctx.beginPath(); ctx.moveTo(560, 180); ctx.lineTo(640, 120); ctx.strokeStyle = "black"; ctx.lineWidth = 1; ctx.stroke();ctx.beginPath(); ctx.moveTo(640, 120); ctx.lineTo(720, 60); ctx.strokeStyle = "black"; ctx.lineWidth = 1; ctx.stroke();ctx.beginPath(); ctx.moveTo(720, 60); ctx.lineTo(800, 0); ctx.strokeStyle = "black"; ctx.lineWidth = 1; ctx.stroke();</script></body></html>
